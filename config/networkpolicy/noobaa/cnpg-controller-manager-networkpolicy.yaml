apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-controller-manager
  namespace: openshift-storage
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: cloudnative-pg
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 8080
  # Webhook port: API server calls this for admission webhooks.
  # API server uses hostNetwork so it can't be matched by namespaceSelector.
  - ports:
    - protocol: TCP
      port: 9443
