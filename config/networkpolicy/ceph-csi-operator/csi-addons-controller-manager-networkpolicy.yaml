apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: csi-addons-controller-manager
  namespace: openshift-storage
spec:
  podSelector:
    matchLabels:
      app: csi-addons-controller-manager
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 8443
