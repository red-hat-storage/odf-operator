apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rook-ceph-osd-prepare
  namespace: openshift-storage
spec:
  podSelector:
    matchLabels:
      app: rook-ceph-osd-prepare
  policyTypes:
  - Ingress
  - Egress
  egress:
  # API server: osd-prepare queries node topology labels via K8s API.
  # The API server is host-networked so it can't be targeted by selector.
  - {}
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-storage
      podSelector:
        matchLabels:
          app: rook-ceph-mon
    ports:
    - protocol: TCP
      port: 3300
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-storage
      podSelector:
        matchLabels:
          app: rook-ceph-mgr
    ports:
    - protocol: TCP
      port: 9283
    - protocol: TCP
      port: 6800
      endPort: 7300
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-storage
      podSelector:
        matchLabels:
          app: rook-ceph-osd
    ports:
    - protocol: TCP
      port: 6800
      endPort: 7300
