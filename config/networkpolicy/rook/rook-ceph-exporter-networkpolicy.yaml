# Egress-only: CSI node plugins use hostNetwork, so their traffic arrives from
# node IPs which cannot be matched by namespaceSelector/podSelector ingress rules.
# Restricting ingress would require ipBlock CIDRs that are cluster-specific and
# fragile, so we only enforce egress on Ceph daemon pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rook-ceph-exporter
  namespace: openshift-storage
spec:
  podSelector:
    matchLabels:
      app: rook-ceph-exporter
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-monitoring
    ports:
    - protocol: TCP
      port: 9926
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-dns
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: openshift-storage
      podSelector:
        matchLabels:
          app: rook-ceph-mon
    ports:
    - protocol: TCP
      port: 3300
